<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KResume Benchmark</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f5;
  color: #333;
    padding: 32px;
}
h1 { font-size: 24px; margin-bottom: 4px; }
p { color: #666; margin-bottom: 20px; }
.controls { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
button {
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #2c3e50;
  color: white;
  transition: background 0.2s;
}
button:hover { background: #34495e; }
button:disabled { background: #95a5a6; cursor: not-allowed; }
.spinner {
  display: none;
  width: 20px;
  height: 20px;
  border: 3px solid #ddd;
  border-top-color: #2c3e50;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.spinner.active { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

.engine-label {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
}
.engine-jsr223 { background: #e3f2fd; color: #1565c0; }
.engine-kctfork { background: #fce4ec; color: #c62828; }
.engine-raw { background: #e8f5e9; color: #2e7d32; }

.best { font-weight: 700; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  margin-bottom: 8px;
}
th, td {
  padding: 8px 12px;
  text-align: center;
  font-size: 12px;
  border-bottom: 1px solid #eee;
}
th { background: #2c3e50; color: white; font-weight: 600; }
th:first-child, td:first-child { text-align: left; }
.size-header { background: #34495e; color: #ccc; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f0f4f8; }
.metric-name { font-weight: 600; color: #555; font-size: 11px; }
.error-msg { color: #f44336; margin-top: 12px; font-size: 13px; }
.chart-section {
  max-width: 740px;
  margin: 0 auto 24px auto;
  background: white;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  padding: 20px;
  text-align: center;
}
.chart-section select {
  margin-bottom: 16px;
  padding: 6px 12px;
  font-size: 14px;
  border-radius: 4px;
  border: 1px solid #ccc;
  background: white;
}
</style>
</head>
<body>
<h1>KResume Benchmark</h1>
<p>Compilation performance metrics across sample resume sizes.</p>
<div class="controls">
  <button id="runBtn" onclick="runBenchmark()">Run Benchmark</button>
  <span class="spinner" id="spinner"></span>
</div>
<div id="errorMsg" class="error-msg"></div>
<div class="chart-section">
  <select id="metricSelect" onchange="onMetricChange()">
    <option value="coldStartMs">Cold (ms)</option>
    <option value="p50">P50 (ms)</option>
    <option value="p95">P95 (ms)</option>
    <option value="p99">P99 (ms)</option>
    <option value="mean">Mean (ms)</option>
    <option value="stdDev">StdDev</option>
    <option value="heapDeltaKb">Heap Δ (KB)</option>
    <option value="gcPauseMs">GC (ms)</option>
  </select>
  <select id="sizeSelect" onchange="onSizeChange()">
    <option value="all">All sizes</option>
    <option value="50">50 lines</option>
    <option value="200">200 lines</option>
    <option value="500">500 lines</option>
    <option value="2000">2000 lines</option>
  </select>
  <br>
  <canvas id="chart" width="700" height="350"></canvas>
</div>
<div id="tables"></div>
<script>
var runBtn = document.getElementById("runBtn");
var spinner = document.getElementById("spinner");
var tables = document.getElementById("tables");
var errorMsg = document.getElementById("errorMsg");
var ENGINES = ["jsr223", "kctfork", "raw"];
var METRICS = [
  { key: "coldStartMs", label: "Cold (ms)", decimals: 0 },
  { key: null, sub: "p50", label: "P50 (ms)", decimals: 1 },
  { key: null, sub: "p95", label: "P95 (ms)", decimals: 1 },
  { key: null, sub: "p99", label: "P99 (ms)", decimals: 1 },
  { key: null, sub: "mean", label: "Mean (ms)", decimals: 1 },
  { key: null, sub: "stdDev", label: "StdDev", decimals: 1 },
  { key: "heapDeltaKb", label: "Heap Δ (KB)", decimals: 0 },
  { key: "gcPauseMs", label: "GC (ms)", decimals: 0 },
];

var canvas = document.getElementById("chart");
var benchData = null;

function niceNum(x, round) {
  var exp = Math.floor(Math.log10(x));
  var f = x / Math.pow(10, exp);
  var nf;
  if (round) {
    if (f < 1.5) nf = 1;
    else if (f < 3) nf = 2;
    else if (f < 7) nf = 5;
    else nf = 10;
  } else {
    if (f <= 1) nf = 1;
    else if (f <= 2) nf = 2;
    else if (f <= 5) nf = 5;
    else nf = 10;
  }
  return nf * Math.pow(10, exp);
}

function computeScale(min, max, tickCount) {
  if (min === max) {
    if (min === 0) return { min: 0, max: 1, step: 0.2 };
    var s = niceNum(Math.abs(min) * 0.25, true);
    return { min: min - s * 2, max: max + s * 2, step: s };
  }
  var range = max - min;
  var step = niceNum(range / (tickCount - 1), true);
  var niceMin = Math.floor(min / step) * step;
  var niceMax = Math.ceil(max / step) * step;
  while ((niceMax - niceMin) / step < tickCount - 1) {
    niceMax += step;
  }
  return { min: niceMin, max: niceMax, step: step };
}

function getMetricLabel(key) {
  for (var i = 0; i < METRICS.length; i++) {
    if (METRICS[i].key === key || METRICS[i].sub === key) return METRICS[i].label;
  }
  return key;
}

function onMetricChange() {
  if (!benchData) return;
  drawChart(benchData, document.getElementById("metricSelect").value);
}
function onSizeChange() {
  if (!benchData) return;
  drawChart(benchData, document.getElementById("metricSelect").value);
}

function getVal(row, key) {
  if (!row) return null;
  if (["p50","p95","p99","mean","stdDev"].indexOf(key) !== -1) return row.hot ? row.hot[key] : null;
  return row[key];
}

function drawChart(data, metricKey) {
  var ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, 700, 350);

  var engines = ["jsr223", "kctfork", "raw"];
  var colors = { jsr223: "#1565c0", kctfork: "#c62828", raw: "#2e7d32" };
  var pad = { top: 40, right: 30, bottom: 50, left: 60 };
  var plotW = 700 - pad.left - pad.right;
  var plotH = 350 - pad.top - pad.bottom;

  var selectedSize = document.getElementById("sizeSelect").value;

  // Gather values
  var allValues = [];
  var series = {};

  if (selectedSize === "all") {
    // Line chart across sizes
    var sizes = [50, 200, 500, 2000];
    engines.forEach(function (engine) {
      var vals = sizes.map(function (s) { var v = getVal(data.find(function(r){return r.engine===engine&&r.size===s}), metricKey); if (v!=null) allValues.push(v); return v; });
      series[engine] = vals;
    });

    if (allValues.length === 0) { noData(ctx); return; }
    var scale = computeScale(Math.min.apply(null,allValues), Math.max.apply(null,allValues), 5);
    drawAxes(ctx, pad, plotW, plotH, scale);

    // X labels
    ctx.fillStyle = "#666"; ctx.font = "11px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "top";
    sizes.forEach(function(s,i){ ctx.fillText(s, pad.left+(i/(sizes.length-1))*plotW, pad.top+plotH+8); });
    ctx.fillText("Size (lines)", pad.left+plotW/2, 350-18);

    // Lines
    engines.forEach(function (engine) {
      var vals = series[engine];
      var c = colors[engine];
      ctx.strokeStyle = c; ctx.fillStyle = c; ctx.lineWidth = 2;
      ctx.beginPath();
      var started = false;
      vals.forEach(function (v,i) {
        if (v==null) return;
        var px = pad.left+(i/(sizes.length-1))*plotW, py = pad.top+plotH-((v-scale.min)/(scale.max-scale.min))*plotH;
        if (!started) { ctx.moveTo(px,py); started=true; } else ctx.lineTo(px,py);
      });
      ctx.stroke();
      vals.forEach(function (v,i) {
        if (v==null) return;
        var px = pad.left+(i/(sizes.length-1))*plotW, py = pad.top+plotH-((v-scale.min)/(scale.max-scale.min))*plotH;
        ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
      });
    });
    drawLegend(ctx, pad, plotW, engines, colors);
  } else {
    // Bar chart for single size
    var size = parseInt(selectedSize);
    engines.forEach(function (engine) {
      var v = getVal(data.find(function(r){return r.engine===engine&&r.size===size}), metricKey);
      if (v != null) allValues.push(v);
      series[engine] = v;
    });

    if (allValues.length === 0) { noData(ctx); return; }
    var minVal = Math.min.apply(null,allValues), maxVal = Math.max.apply(null,allValues);
    if (minVal > 0) minVal = 0; // bars start at 0
    var scale = computeScale(minVal, maxVal, 5);
    drawAxes(ctx, pad, plotW, plotH, scale);

    // Bars
    var barW = Math.min(60, (plotW / engines.length) * 0.6);
    var gap = (plotW - barW * engines.length) / (engines.length + 1);
    engines.forEach(function (engine, i) {
      var v = series[engine];
      if (v == null) return;
      var bx = pad.left + gap + i * (barW + gap);
      var by = pad.top + plotH - ((v - scale.min) / (scale.max - scale.min)) * plotH;
      var bh = ((v - scale.min) / (scale.max - scale.min)) * plotH;
      ctx.fillStyle = colors[engine];
      ctx.fillRect(bx, by, barW, bh);

      // Value label on top
      ctx.fillStyle = "#333"; ctx.font = "11px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
      var decimals = v === Math.floor(v) ? 0 : 1;
      ctx.fillText(Number(v).toFixed(decimals), bx + barW/2, by - 3);
    });

    // Engine labels below X axis
    ctx.fillStyle = "#666"; ctx.font = "11px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "top";
    engines.forEach(function (engine, i) {
      var bx = pad.left + gap + i * (barW + gap);
      ctx.fillStyle = colors[engine];
      ctx.fillRect(bx + barW/2 - 5, pad.top + plotH + 8, 10, 10);
      ctx.fillStyle = "#333";
      ctx.fillText(engine, bx + barW/2, pad.top + plotH + 22);
    });
  }
}

function noData(ctx) {
  ctx.fillStyle = "#999"; ctx.font = "14px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("No data for selected metric", 350, 175);
}

function drawAxes(ctx, pad, plotW, plotH, scale) {
  var tickCount = Math.round((scale.max - scale.min) / scale.step) + 1;
  ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  for (var i = 0; i < tickCount; i++) {
    var yVal = scale.min + i * scale.step;
    var py = pad.top + plotH - ((yVal - scale.min) / (scale.max - scale.min)) * plotH;
    ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(pad.left + plotW, py); ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.strokeStyle = "#333"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + plotH); ctx.lineTo(pad.left + plotW, pad.top + plotH); ctx.stroke();

  ctx.fillStyle = "#666"; ctx.font = "11px sans-serif"; ctx.textAlign = "right"; ctx.textBaseline = "middle";
  for (var i = 0; i < tickCount; i++) {
    var yVal = scale.min + i * scale.step;
    var py = pad.top + plotH - ((yVal - scale.min) / (scale.max - scale.min)) * plotH;
    ctx.fillText(Number(yVal).toFixed(scale.step < 1 ? 1 : 0), pad.left - 8, py);
  }

  ctx.save(); ctx.translate(18, pad.top + plotH / 2); ctx.rotate(-Math.PI / 2);
  ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillStyle = "#666";
  ctx.fillText(document.getElementById("metricSelect").options[document.getElementById("metricSelect").selectedIndex].text, 0, 0);
  ctx.restore();
}

function drawLegend(ctx, pad, plotW, engines, colors) {
  var lx = pad.left + plotW - 10, ly = pad.top + 10;
  ctx.textAlign = "right"; ctx.textBaseline = "middle"; ctx.font = "12px sans-serif";
  engines.forEach(function (e, i) {
    var y = ly + i * 18;
    ctx.fillStyle = colors[e]; ctx.fillRect(lx - 60, y - 5, 12, 10);
    ctx.fillStyle = "#333"; ctx.fillText(e, lx, y);
  });
}

function runBenchmark() {
  runBtn.disabled = true;
  spinner.classList.add("active");
  errorMsg.textContent = "";

  fetch("/api/bench", { method: "POST" })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status + " " + r.statusText);
      return r.json();
    })
    .then(function (data) {
      // Build lookup: engine+size -> row
      var lookup = {};
      data.forEach(function (row) { lookup[row.engine + "-" + row.size] = row; });
      var sizes = [50, 200, 500, 2000];

      var html = "";
      sizes.forEach(function (size) {
        html += '<table>';
        // Size header row
        html += '<tr class="size-header"><th colspan="' + (1 + ENGINES.length) + '">Size: ' + size + ' lines</th></tr>';
        // Column headers
        html += '<tr><th>Metric</th>';
        ENGINES.forEach(function (e) {
          html += '<th><span class="engine-label engine-' + e + '">' + e + '</span></th>';
        });
        html += '</tr>';
        // Metric rows
        METRICS.forEach(function (m) {
          html += '<tr>';
          html += '<td class="metric-name">' + m.label + '</td>';
          var vals = [];
          ENGINES.forEach(function (e) {
            var row = lookup[e + "-" + size];
            var val = null;
            if (row) {
              if (m.key) val = row[m.key];
              else if (m.sub) val = row.hot[m.sub];
            }
            vals.push(val);
          });
          // Find best (lowest) for highlight
          var numeric = vals.filter(function (v) { return v != null && typeof v === 'number'; });
          var best = numeric.length > 0 ? Math.min.apply(null, numeric) : null;
          ENGINES.forEach(function (e, i) {
            var val = vals[i];
            var cls = (val === best && val != null) ? ' class="best"' : '';
            html += '<td' + cls + '>' + (val != null ? Number(val).toFixed(m.decimals) : '—') + '</td>';
          });
          html += '</tr>';
        });
        html += '</table>';
        html += '<br>';
      });

      tables.innerHTML = html;
      benchData = data;
      var select = document.getElementById("metricSelect");
      select.selectedIndex = 0;
      onMetricChange();
    })
    .catch(function (err) {
      errorMsg.textContent = "Benchmark failed: " + (err.message || "Unknown error") + ". Click Run to retry.";
    })
    .finally(function () {
      runBtn.disabled = false;
      spinner.classList.remove("active");
    });
}

function escapeCell(val) {
  if (val == null) return "—";
  var str = String(val);
  var div = document.createElement("div");
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function drawPlaceholder() {
  var ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, 700, 350);
  ctx.fillStyle = "#999";
  ctx.font = "14px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Run Benchmark to see chart", 350, 175);
}
drawPlaceholder();
</script>
</body>
</html>
